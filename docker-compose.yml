services:
  monitor:
    build:
      context: ./Monitor
    container_name: monitor_app
    volumes:
      - ./Monitor:/app
    working_dir: /app
    command: python main.py

  cat_pyrate:
    build:
      context: ./CatPyrate
    container_name: cat_pyrate_app
    volumes:
      - ./CatPyrate:/app
    working_dir: /app
    command: python main.py

  website_checker:
    build:
      context: ./WebsiteChecker
    container_name: website_checker
    volumes:
      - ./WebsiteChecker:/app
    working_dir: /app
    command: python main.py

  weather_bot:
    build:
      context: ./WeatherBot
    container_name: WeatherBot
    volumes:
      - ./WeatherBot:/app
    working_dir: /app
    command: python main.py